---
  - name: Restart sing-box
    service:
      name: sing-box
      state: restarted

  - name: Restart network
    service:
      name: network
      state: restarted

  - name: Restart firewall
    service:
      name: firewall
      state: restarted

  - name: Run routewolf script
    service:
      name: routewolf
      state: restarted

  - name: Restart dnscrypt-proxy
    service:
      name: dnscrypt-proxy
      state: restarted
      enabled: yes
      
  - name: Restart dnsmasq
    service:
      name: dnsmasq
      state: restarted